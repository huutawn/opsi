syntax = "proto3";

package opsi.agent.v1;

option go_package = "github.com/opsi-dev/opsi/contracts/go/agentv1";

service StatusService {
  rpc Status(StatusRequest) returns (StatusResponse);
}

service ServiceManagerService {
  rpc ListCatalog(ListCatalogRequest) returns (ListCatalogResponse);
  rpc CreateManagedService(CreateManagedServiceRequest) returns (ManagedServiceResponse);
  rpc RegisterExternalService(RegisterExternalServiceRequest) returns (ManagedServiceResponse);
  rpc GetManagedService(GetManagedServiceRequest) returns (ManagedServiceResponse);
  rpc DeleteManagedService(DeleteManagedServiceRequest) returns (DeleteManagedServiceResponse);
}

service TelemetryService {
  rpc Sync(SyncRequest) returns (stream SyncChunk);
  rpc QueryTelemetry(TelemetryQueryRequest) returns (TelemetryQueryResponse);
}

service SecretService {
  rpc SetupTOTP(SetupTOTPRequest) returns (SetupTOTPResponse);
  rpc CreateSecret(SecretRequest) returns (SecretResponse);
  rpc RevealSecret(SecretRequest) returns (SecretResponse);
  rpc RotateSecret(SecretRequest) returns (SecretResponse);
}

service IncidentService {
  rpc ListIncidents(IncidentListRequest) returns (IncidentListResponse);
  rpc GetIncident(IncidentGetRequest) returns (IncidentResponse);
  rpc ResolveIncident(IncidentResolveRequest) returns (IncidentResponse);
}

message StatusRequest {}

message StatusResponse {
	reserved 7;
	reserved "errors";

  string version = 1;
  int64 uptime_seconds = 2;
  string node_id = 3;
  string health = 4;
  bool cloud_connected = 5;
  int64 started_at_unix = 6;
}

message ListCatalogRequest {}

message ListCatalogResponse {
  repeated CatalogService services = 1;
}

message CatalogService {
  string type = 1;
  string display_name = 2;
  repeated CatalogConfigKey config_keys = 3;
  repeated string secret_keys = 4;
  repeated string env_vars = 5;
  bool managed_supported = 6;
}

message CatalogConfigKey {
  string key = 1;
  string default = 2;
  bool required = 3;
}

message CreateManagedServiceRequest {
  string project_id = 1;
  string name = 2;
  string type = 3;
  string namespace = 4;
  map<string, string> overrides = 5;
}

message RegisterExternalServiceRequest {
  string project_id = 1;
  string name = 2;
  string type = 3;
  string namespace = 4;
  string host = 5;
  string port = 6;
  map<string, string> overrides = 7;
}

message GetManagedServiceRequest {
  string project_id = 1;
  string id = 2;
}

message DeleteManagedServiceRequest {
  string project_id = 1;
  string id = 2;
  bool purge_data = 3;
}

message DeleteManagedServiceResponse {
  string project_id = 1;
  string id = 2;
  bool deleted = 3;
}

message ManagedServiceResponse {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string type = 4;
  string namespace = 5;
  string mode = 6;
  string status = 7;
  string host = 8;
  string port = 9;
  string version = 10;
  map<string, string> config = 11;
  string secret_name = 12;
  string configmap_name = 13;
  int64 created_at_unix = 14;
  int64 updated_at_unix = 15;
}

message SyncRequest {
  string project_id = 1;
  int64 last_received_unix = 2;
  repeated string resource_ids = 3;
  int32 max_chunk_bytes = 4;
}

message SyncChunk {
  string project_id = 1;
  int64 start_unix = 2;
  int64 end_unix = 3;
  int32 record_count = 4;
  string compression = 5;
  string checksum_sha256 = 6;
  bytes payload = 7;
  bool done = 8;
}

message TelemetryQueryRequest {
  string project_id = 1;
  string service_id = 2;
  int64 since_unix = 3;
  string cursor = 4;
  int32 limit = 5;
  bool include_logs = 6;
  bool include_summary = 7;
  bool include_services = 8;
}

message TelemetryQueryResponse {
  string project_id = 1;
  string source = 2;
  string payload_policy = 3;
  TelemetryRuntimeSummary summary = 4;
  repeated TelemetryServiceStatus services = 5;
  repeated TelemetryLogEntry logs = 6;
  string next_cursor = 7;
}

message TelemetryRuntimeSummary {
  int64 since_unix = 1;
  int64 end_unix = 2;
  int32 metric_count = 3;
  int32 log_count = 4;
  int32 error_count = 5;
  int32 service_count = 6;
  string health = 7;
}

message TelemetryServiceStatus {
  string service_id = 1;
  string health = 2;
  int32 pod_count = 3;
  int32 ready_pods = 4;
  double cpu_cores = 5;
  double memory_bytes = 6;
  int32 restart_count = 7;
  int32 recent_error_count = 8;
  int64 last_seen_unix = 9;
}

message TelemetryLogEntry {
  string service_id = 1;
  string pod_id = 2;
  string namespace = 3;
  string level = 4;
  string message = 5;
  string fingerprint = 6;
  int64 observed_unix = 7;
}

message SetupTOTPRequest {
  reserved 2, 3, 4;
  reserved "user_id", "role", "pat";

  string project_id = 1;
}

message SetupTOTPResponse {
  string secret = 1;
  string uri = 2;
}

message SecretRequest {
  reserved 5, 6, 7;
  reserved "user_id", "role", "pat";

  string project_id = 1;
  string service_id = 2;
  string name = 3;
  string namespace = 4;
  string otp_code = 8;
  string totp_code = 9;
  string otp_request_id = 10;
}

message SecretResponse {
  string project_id = 1;
  string service_id = 2;
  string name = 3;
  string namespace = 4;
  string username = 5;
  string password = 6;
}

message IncidentListRequest {
  reserved 4, 5, 6;
  reserved "user_id", "role", "pat";

  string project_id = 1;
  string status = 2;
  int32 limit = 3;
}

message IncidentGetRequest {
  reserved 3, 4, 5;
  reserved "user_id", "role", "pat";

  string project_id = 1;
  string incident_id = 2;
}

message IncidentResolveRequest {
  reserved 3, 4, 5;
  reserved "user_id", "role", "pat";

  string project_id = 1;
  string incident_id = 2;
}

message IncidentListResponse {
  repeated IncidentResponse incidents = 1;
}

message IncidentResponse {
  string incident_id = 1;
  string project_id = 2;
  string service_id = 3;
  string status = 4;
  string node_id = 5;
  string pod_id = 6;
  string anomaly_type = 7;
  string severity = 8;
  int64 created_at_unix = 9;
  int64 resolved_at_unix = 10;
  int64 mttr_seconds = 11;
}
