syntax = "proto3";

package opsi.agent.v1;

option go_package = "github.com/opsi-dev/opsi/contracts/go/agentv1";

service StatusService {
  rpc Status(StatusRequest) returns (StatusResponse);
}

service DeploymentService {
  rpc Deploy(DeployRequest) returns (stream ProgressEvent);
}

service ServiceManagerService {
  rpc ListCatalog(ListCatalogRequest) returns (ListCatalogResponse);
  rpc CreateManagedService(CreateManagedServiceRequest) returns (ManagedServiceResponse);
  rpc RegisterExternalService(RegisterExternalServiceRequest) returns (ManagedServiceResponse);
  rpc GetManagedService(GetManagedServiceRequest) returns (ManagedServiceResponse);
  rpc DeleteManagedService(DeleteManagedServiceRequest) returns (DeleteManagedServiceResponse);
}

service TelemetryService {
  rpc Sync(SyncRequest) returns (stream SyncChunk);
}

service SecretService {
  rpc SetupTOTP(SetupTOTPRequest) returns (SetupTOTPResponse);
  rpc CreateSecret(SecretRequest) returns (SecretResponse);
  rpc RevealSecret(SecretRequest) returns (SecretResponse);
  rpc RotateSecret(SecretRequest) returns (SecretResponse);
}

service IncidentService {
  rpc AnalyzeIncident(IncidentAnalyzeRequest) returns (IncidentResponse);
  rpc ApproveIncidentAction(IncidentActionRequest) returns (IncidentResponse);
  rpc ResolveIncident(IncidentActionRequest) returns (IncidentResponse);
}

message StatusRequest {}

message StatusResponse {
  string version = 1;
  int64 uptime_seconds = 2;
  string node_id = 3;
  string health = 4;
  bool cloud_connected = 5;
  int64 started_at_unix = 6;
  repeated ServiceError errors = 7;
}

message ServiceError {
  ErrorCode code = 1;
  string message = 2;
}

message ProgressEvent {
  string operation_id = 1;
  string phase = 2;
  string message = 3;
  int32 percent = 4;
  ServiceError error = 5;
  string project_id = 6;
  string service_id = 7;
  string service_name = 8;
}

message DeployRequest {
  string project_id = 1;
  string service_id = 2;
  string service_name = 3;
  string service_type = 4;
  string repo_url = 5;
  string branch = 6;
  string git_sha = 7;
  string namespace = 8;
  string build_context = 9;
  string dockerfile = 10;
  string manifest_path = 11;
  string registry = 12;
  string image_tag = 13;
  string triggered_by = 14;
  repeated string watch_paths = 15;
  int32 termination_grace_period_seconds = 16;
  string resource_requests_json = 17;
  string resource_limits_json = 18;
  bool ingress_enabled = 19;
  repeated ServiceDependency depends_on = 20;
}

message ServiceDependency {
  string name = 1;
  string env_prefix = 2;
  bool expose_as_default = 3;
}

message ListCatalogRequest {}

message ListCatalogResponse {
  repeated CatalogService services = 1;
}

message CatalogService {
  string type = 1;
  string display_name = 2;
  repeated CatalogConfigKey config_keys = 3;
  repeated string secret_keys = 4;
  repeated string env_vars = 5;
  bool managed_supported = 6;
}

message CatalogConfigKey {
  string key = 1;
  string default = 2;
  bool required = 3;
}

message CreateManagedServiceRequest {
  string project_id = 1;
  string name = 2;
  string type = 3;
  string namespace = 4;
  map<string, string> overrides = 5;
}

message RegisterExternalServiceRequest {
  string project_id = 1;
  string name = 2;
  string type = 3;
  string namespace = 4;
  string host = 5;
  string port = 6;
  map<string, string> overrides = 7;
}

message GetManagedServiceRequest {
  string project_id = 1;
  string id = 2;
}

message DeleteManagedServiceRequest {
  string project_id = 1;
  string id = 2;
  bool purge_data = 3;
}

message DeleteManagedServiceResponse {
  string project_id = 1;
  string id = 2;
  bool deleted = 3;
}

message ManagedServiceResponse {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string type = 4;
  string namespace = 5;
  string mode = 6;
  string status = 7;
  string host = 8;
  string port = 9;
  string version = 10;
  map<string, string> config = 11;
  string secret_name = 12;
  string configmap_name = 13;
  int64 created_at_unix = 14;
  int64 updated_at_unix = 15;
}

message SyncRequest {
  string project_id = 1;
  int64 last_received_unix = 2;
  repeated string resource_ids = 3;
  int32 max_chunk_bytes = 4;
}

message SyncChunk {
  string project_id = 1;
  int64 start_unix = 2;
  int64 end_unix = 3;
  int32 record_count = 4;
  string compression = 5;
  string checksum_sha256 = 6;
  bytes payload = 7;
  bool done = 8;
}

message SetupTOTPRequest {
  string project_id = 1;
  string user_id = 2;
  string role = 3;
  string pat = 4;
}

message SetupTOTPResponse {
  string secret = 1;
  string uri = 2;
}

message SecretRequest {
  string project_id = 1;
  string service_id = 2;
  string name = 3;
  string namespace = 4;
  string user_id = 5;
  string role = 6;
  string pat = 7;
  string otp_code = 8;
  string totp_code = 9;
  string otp_request_id = 10;
}

message SecretResponse {
  string project_id = 1;
  string service_id = 2;
  string name = 3;
  string namespace = 4;
  string username = 5;
  string password = 6;
}

message IncidentAnalyzeRequest {
  string project_id = 1;
  string incident_id = 2;
  string user_id = 3;
  string role = 4;
  string pat = 5;
}

message IncidentActionRequest {
  string project_id = 1;
  string incident_id = 2;
  string action_id = 3;
  string action_hash = 4;
  string user_id = 5;
  string role = 6;
  string pat = 7;
}

message IncidentResponse {
  string incident_id = 1;
  string project_id = 2;
  string service_id = 3;
  string status = 4;
  string root_cause = 5;
  double confidence = 6;
  repeated string contributing_factors = 7;
  repeated RecommendedAction recommended_actions = 8;
  string mitigation_actions_json = 9;
  int64 resolved_at_unix = 10;
  int64 mttr_seconds = 11;
  RCAMetadata rca_metadata = 12;
}

message RecommendedAction {
  string id = 1;
  string type = 2;
  string description = 3;
  bool rollback_safe = 4;
  map<string, string> params = 5;
  string action_hash = 6;
}

message RCAMetadata {
  string provider = 1;
  string configured_provider = 2;
  string model = 3;
  bool fallback_used = 4;
  string input_context_hash = 5;
  string created_at = 6;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_AUTH_FAILED = 1;
  ERROR_CODE_UNAVAILABLE = 2;
  ERROR_CODE_INVALID_INPUT = 3;
  ERROR_CODE_TIMEOUT = 4;
  ERROR_CODE_PERMISSION_DENIED = 5;
  ERROR_CODE_INTERNAL = 6;
}
