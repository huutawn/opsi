apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsi-e2e-sample
  labels:
    app.kubernetes.io/name: opsi-e2e-sample
    opsi.dev/e2e: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opsi-e2e-sample
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opsi-e2e-sample
        opsi.dev/e2e: "true"
    spec:
      containers:
        - name: app
          image: opsi-e2e-sample:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opsi-e2e-sample
  labels:
    app.kubernetes.io/name: opsi-e2e-sample
    opsi.dev/e2e: "true"
spec:
  selector:
    app.kubernetes.io/name: opsi-e2e-sample
  ports:
    - name: http
      port: 80
      targetPort: 8080
