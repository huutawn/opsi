x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    logging: *bounded-logging

  cloud:
    image: opsi-cloud-dev:${OPSI_VERSION:-dev}
    build:
      context: ../..
      dockerfile: cloud/Dockerfile
      target: cloud
      args:
        GO_VERSION: 1.26.4
        VERSION: ${OPSI_VERSION:-dev}
    command: ["--addr", "0.0.0.0:9800", "--config", "/etc/opsi/cloud.json"]
    environment:
      OPSI_CLOUD_TTL: ${OPSI_CLOUD_TTL}
      OPSI_CLOUD_DATABASE_URL: ${OPSI_CLOUD_DATABASE_URL}
      OPSI_CLOUD_PUBLIC_BASE_URL: ${OPSI_CLOUD_PUBLIC_BASE_URL}
      OPSI_CLOUD_PRODUCTION: ${OPSI_CLOUD_PRODUCTION}
      OPSI_CLOUD_ENABLE_DEBUG_UI: ${OPSI_CLOUD_ENABLE_DEBUG_UI}
      OPSI_CLOUD_REQUIRE_AGENT_SIGNATURES: ${OPSI_CLOUD_REQUIRE_AGENT_SIGNATURES}
      OPSI_CLOUD_OTP_DEV_ECHO: ${OPSI_CLOUD_OTP_DEV_ECHO}
      OPSI_CLOUD_OTP_OUTBOX_PATH: ${OPSI_CLOUD_OTP_OUTBOX_PATH}
      OPSI_CLOUD_SMTP_HOST: ${OPSI_CLOUD_SMTP_HOST}
      OPSI_CLOUD_SMTP_PORT: ${OPSI_CLOUD_SMTP_PORT}
      OPSI_CLOUD_SMTP_USERNAME: ${OPSI_CLOUD_SMTP_USERNAME}
      OPSI_CLOUD_SMTP_PASSWORD: ${OPSI_CLOUD_SMTP_PASSWORD}
      OPSI_CLOUD_SMTP_FROM: ${OPSI_CLOUD_SMTP_FROM}
      OPSI_CLOUD_ALERTS_WEBHOOK_URL: ${OPSI_CLOUD_ALERTS_WEBHOOK_URL}
      OPSI_CLOUD_ALERTS_MIN_SEVERITY: ${OPSI_CLOUD_ALERTS_MIN_SEVERITY}
      OPSI_CLOUD_ALERTS_OUTBOX_PATH: ${OPSI_CLOUD_ALERTS_OUTBOX_PATH}
      OPSI_CLOUD_ALERTS_INTERNAL_TOKEN: ${OPSI_CLOUD_ALERTS_INTERNAL_TOKEN}
      OPSI_CLOUD_BOOTSTRAP_WORKER_TOKEN: ${OPSI_CLOUD_BOOTSTRAP_WORKER_TOKEN}
      OPSI_CLOUD_BOOTSTRAP_SECRET_KEY: ${OPSI_CLOUD_BOOTSTRAP_SECRET_KEY}
      OPSI_CLOUD_GITHUB_APP_CLIENT_ID: ${OPSI_CLOUD_GITHUB_APP_CLIENT_ID}
      OPSI_CLOUD_GITHUB_APP_CLIENT_SECRET: ${OPSI_CLOUD_GITHUB_APP_CLIENT_SECRET}
      OPSI_CLOUD_GITHUB_APP_CALLBACK_URL: ${OPSI_CLOUD_GITHUB_APP_CALLBACK_URL}
      OPSI_CLOUD_GITHUB_APP_ID: ${OPSI_CLOUD_GITHUB_APP_ID}
      OPSI_CLOUD_GITHUB_APP_PRIVATE_KEY_PATH: ${OPSI_CLOUD_GITHUB_APP_PRIVATE_KEY_PATH}
      OPSI_CLOUD_GITHUB_APP_WEBHOOK_SECRET: ${OPSI_CLOUD_GITHUB_APP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/cloud.json:/etc/opsi/cloud.json:ro,Z
      - ./secrets/github-app-private-key.pem:/run/secrets/github-app-private-key.pem:ro,Z
      - ./secrets:/run/opsi-secrets:Z
      - ./secrets/github-app-private-key.pem:/run/opsi-secrets/github-app-private-key.pem:ro,Z
      - cloud-data:/var/lib/opsi
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9800/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    logging: *bounded-logging

  bootstrap-worker:
    image: opsi-bootstrap-worker-dev:${OPSI_VERSION:-dev}
    build:
      context: ../..
      dockerfile: cloud/Dockerfile
      target: bootstrap-worker
      args:
        GO_VERSION: 1.26.4
        VERSION: ${OPSI_VERSION:-dev}
    command: ["--config", "/etc/opsi/bootstrap-worker.json"]
    depends_on:
      cloud:
        condition: service_healthy
    volumes:
      - ./config/bootstrap-worker.json:/etc/opsi/bootstrap-worker.json:ro,Z
      - ./secrets/ssh_known_hosts:/etc/opsi/ssh_known_hosts:ro,Z
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "opsi-bootstrap-worker", "--check", "--config", "/etc/opsi/bootstrap-worker.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *bounded-logging

  reverse-proxy:
    image: caddy:2.10.0-alpine
    depends_on:
      cloud:
        condition: service_healthy
    ports:
      - "${OPSI_DEV_BIND_ADDRESS}:${OPSI_DEV_HTTP_PORT}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    logging: *bounded-logging

volumes:
  postgres-data:
  cloud-data:
