route:
  receiver: opsi-cloud-webhook
  group_by: ["alertname", "project_id"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="high"
      receiver: opsi-cloud-webhook
      repeat_interval: 15m

receivers:
  - name: opsi-cloud-webhook
    webhook_configs:
      - url: http://opsi-cloud:9800/api/internal/alerts
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/opsi-alert-token
