node_id: dev-agent-1
listen_addr: 127.0.0.1:9443
health_addr: 127.0.0.1:9080
cloud_endpoint: https://cloud.localhost
sqlite_path: ./opsi-agent.sqlite
auth:
  enabled: false
  verify_cache_ttl: 15m
deployment:
  project_id: dev-project
  service_id: example-app
  namespace: default
  public_endpoint: ""
  dry_run: true
  rollout_timeout: 10m
  poll_interval: 5s
telemetry:
  enabled: true
  interval: 15s
  kubectl_path: kubectl
  cadvisor_endpoint: ""
  cadvisor_timeout: 5s
  max_records_per_tick: 1000
  pod_log_tail: 50
  pod_log_since: 1m
  external_health_interval: 60s
secret:
  namespace: default
  kubectl_path: kubectl
  totp_namespace: default
  rollout_restart_on_rotate: true
  encryption_at_rest_confirmed: false
  cloud_otp_timeout: 10s
tls:
  ca_cert_path: ./certs/ca.crt
  server_cert_path: ./certs/server.crt
  server_key_path: ./certs/server.key
  require_client_cert: true
