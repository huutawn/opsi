node_id: dev-agent-1
listen_addr: 127.0.0.1:9443
health_addr: 127.0.0.1:9080
cloud_endpoint: https://cloud.localhost
sqlite_path: ./opsi-agent.sqlite
auth:
  enabled: false
  verify_cache_ttl: 15m
deployment:
  project_id: dev-project
  service_id: example-app
  service_name: example-app
  service_type: backend
  repo_url: https://github.com/example/app.git
  branch: main
  namespace: default
  build_context: .
  dockerfile: Dockerfile
  manifest_path: k8s/deployment.yaml
  public_endpoint: ""
  watch_paths:
    - "**"
  termination_grace_period_seconds: 30
  resource_requests:
    cpu: 100m
    memory: 128Mi
  resource_limits:
    cpu: 500m
    memory: 512Mi
  ingress_enabled: true
  registry: ""
  builder_mode: containerd
  nerdctl_path: nerdctl
  containerd_namespace: k8s.io
  webhook_secret: dev-webhook-secret
  dry_run: true
  build_root: /tmp/opsi-builds
  rollout_timeout: 10m
  poll_interval: 5s
telemetry:
  enabled: true
  interval: 15s
  kubectl_path: kubectl
  cadvisor_endpoint: ""
  cadvisor_timeout: 5s
  max_records_per_tick: 1000
  pod_log_tail: 50
  pod_log_since: 1m
  external_health_interval: 60s
secret:
  namespace: default
  kubectl_path: kubectl
  totp_namespace: default
  rollout_restart_on_rotate: true
  encryption_at_rest_confirmed: false
  cloud_otp_timeout: 10s
tls:
  ca_cert_path: ./certs/ca.crt
  server_cert_path: ./certs/server.crt
  server_key_path: ./certs/server.key
  require_client_cert: true
