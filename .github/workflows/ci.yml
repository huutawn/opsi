name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      GOCACHE: /tmp/opsi-go-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: |
            agent/go.sum
            cli/go.sum
            cloud/go.sum
            contracts/go/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: cli/ui/package-lock.json
      - run: npm install --global npm@$(cat .npm-version)
      - run: make clean
      - run: make verify
      - run: make build
      - run: make package-source
