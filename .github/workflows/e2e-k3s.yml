name: e2e-k3s

on:
  workflow_dispatch:

jobs:
  clean-vps-k3s:
    runs-on: ubuntu-latest
    environment: e2e-k3s
    if: ${{ secrets.OPSI_E2E_ENABLE == 'true' }}
    env:
      OPSI_E2E_LOCAL_URL: ${{ secrets.OPSI_E2E_LOCAL_URL }}
      OPSI_E2E_PROJECT_ID: ${{ secrets.OPSI_E2E_PROJECT_ID }}
      OPSI_E2E_VPS_HOST: ${{ secrets.OPSI_E2E_VPS_HOST }}
      OPSI_E2E_VPS_SSH_USER: ${{ secrets.OPSI_E2E_VPS_SSH_USER }}
      OPSI_E2E_VPS_SSH_PASSWORD: ${{ secrets.OPSI_E2E_VPS_SSH_PASSWORD }}
      OPSI_E2E_SERVICE_REPO: ${{ secrets.OPSI_E2E_SERVICE_REPO }}
      OPSI_E2E_SERVICE_SHA: ${{ secrets.OPSI_E2E_SERVICE_SHA }}
      OPSI_E2E_BAD_SERVICE_SHA: ${{ secrets.OPSI_E2E_BAD_SERVICE_SHA }}
      OPSI_E2E_TOTP_CODE: ${{ secrets.OPSI_E2E_TOTP_CODE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: sudo apt-get update && sudo apt-get install -y sshpass
      - run: make verify-e2e-k3s-preflight
      - run: make verify-e2e-k3s
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-k3s-redacted-evidence
          path: .tmp/e2e-k3s/**
